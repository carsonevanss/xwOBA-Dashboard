name: Update xwOBA Dashboard

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM ET  — overnight games processed
    - cron: '0 19 * * *'  # 3 PM ET  — day games wrapped
    - cron: '0  0 * * *'  # 8 PM ET  — evening games finishing
    - cron: '0  6 * * *'  # 2 AM ET  — West Coast late games done
  workflow_dispatch:       # manual "Run workflow" button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard updater
        run: python update_dashboard.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Auto-update $(date +'%Y-%m-%d %H:%M UTC')" && git push)
