    "wrc_plus": 0,
    "xwoba_percentile": 0.0,
    "woba_percentile": 9.4,
    "pa_percentile": 17.2,
    "xwoba_rank": 361,
    "position": "C",
    "bats": "L",
    "throws": "R",
    "height": "6' 0\"",
    "weight": "230",
    "headshot_url": "https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_180/v1/people/624512/headshot/67/current",
    "team_name": "Chicago White Sox",
    "team_abbr": "CWS",
    "team_logo": "www.mlbstatic.com/team-logos/team-cap-on-light/145.svg",
    "xslg": 0.004
  }
];  // filled by updater each day;

        // Filter out retired players
        let currentSeason = 2025;
        function getSeasonData(year) {
            const raw = year === 2026 ? playersData2026 : playersData2025;
            return raw.filter(p => p.team_abbr !== 'RETIRED');
        }
        let activePlayers = getSeasonData(2025);

        let currentSort = { column: 'xwoba_plus', direction: 'desc' };
        let filteredPlayers = [...activePlayers];

        function switchSeason(year) {
            currentSeason = year;
            LEAGUE_AVG_XWOBA = SEASON_AVGS[year].xwoba;
            LEAGUE_AVG_WOBA  = SEASON_AVGS[year].woba;
            LEAGUE_AVG_XSLG  = SEASON_AVGS[year].xslg;
            activePlayers = getSeasonData(year);

            // Update button styles
            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.year) === year);
            });

            // Reset PA filter: 2026 early season → show all, 2025 → 200
            const paFilter = document.getElementById('paFilter');
            if (year === 2026 && activePlayers.length > 0) {
                const maxPa = Math.max(...activePlayers.map(p => p.pa));
                paFilter.value = maxPa >= 200 ? '200' : '0';
            } else {
                paFilter.value = '200';
            }

            selectedPlayers.clear();
            comparisonPlayers = [];
            showLeagueAvg = false;
            applyFilters();
            populateFilters();
        }

        let comparisonPlayers = [];
        let showLeagueAvg = false;
        let selectedPlayers = new Set();

        // Gradient colors for initials
        const gradients = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
            'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
            'linear-gradient(135deg, #ff6e7f 0%, #bfe9ff 100%)',
            'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)',
            'linear-gradient(135deg, #f77062 0%, #fe5196 100%)'
        ];

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase();
        }

        function getGradient(playerId) {
            return gradients[playerId % gradients.length];
        }

        function populateFilters() {
            // Only show 30 MLB teams + FA
            const mlbTeams = [
                'AZ', 'ATL', 'BAL', 'BOS', 'CHC', 'CWS', 'CIN', 'CLE', 
                'COL', 'DET', 'HOU', 'KC', 'LAA', 'LAD', 'MIA', 'MIL',
                'MIN', 'NYM', 'NYY', 'OAK', 'PHI', 'PIT', 'SD', 'SF',
                'SEA', 'STL', 'TB', 'TEX', 'TOR', 'WSH'
            ];
            
            const teamsInData = [...new Set(activePlayers.map(p => p.team_abbr))];
            const teams = mlbTeams.filter(team => teamsInData.includes(team)).sort();
            
            // Add FA at the end if it exists in data
            if (teamsInData.includes('FA')) {
                teams.push('FA');
            }
            
            const teamSelect = document.getElementById('teamFilter');
            teams.forEach(team => {
                const option = document.createElement('option');
                option.value = team;
                option.textContent = team;
                teamSelect.appendChild(option);
            });
            
            const positions = [...new Set(activePlayers.map(p => p.position))].sort();
            
            const posSelect = document.getElementById('positionFilter');
            positions.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos;
                option.textContent = pos;
                posSelect.appendChild(option);
            });
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const paThreshold = parseInt(document.getElementById('paFilter').value);
            const teamFilter = document.getElementById('teamFilter').value;
            const posFilter = document.getElementById('positionFilter').value;

            filteredPlayers = activePlayers.filter(player => {
                const matchesSearch = player.full_name.toLowerCase().includes(search) ||
                                    player.team_abbr.toLowerCase().includes(search) ||
                                    player.position.toLowerCase().includes(search);
                const matchesPA = player.pa >= paThreshold;
                const matchesTeam = !teamFilter || player.team_abbr === teamFilter;
                const matchesPos = !posFilter || player.position === posFilter;
                
                return matchesSearch && matchesPA && matchesTeam && matchesPos;
            });

            sortData();
            renderTable();
            updateStats();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('paFilter').value = '200';
            document.getElementById('teamFilter').value = '';
            document.getElementById('positionFilter').value = '';
            selectedPlayers.clear();
            updateCompareButton();
            applyFilters();
        }

        function sortData() {
            filteredPlayers.sort((a, b) => {
                let aVal = a[currentSort.column];
                let bVal = b[currentSort.column];
                
                if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                }
                
                if (currentSort.direction === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (filteredPlayers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="no-data">No players match your filters</td></tr>';
                return;
            }

            filteredPlayers.forEach(player => {
                const row = tbody.insertRow();
                const isChecked = selectedPlayers.has(player.player_id);
                row.innerHTML = `
                    <td><input type="checkbox" class="player-checkbox" data-player-id="${player.player_id}" ${isChecked ? 'checked' : ''} onchange="togglePlayerSelection(${player.player_id})"></td>
                    <td><span class="player-name" onclick="showPlayerDetail(${player.player_id})">${player.full_name}</span></td>
                    <td>${player.position}</td>
                    <td>${player.team_abbr}</td>
                    <td>${player.pa}</td>
                    <td>${player.xwoba.toFixed(3)}</td>
                    <td>${player.woba.toFixed(3)}</td>
                    <td>${player.xwoba_plus}</td>
                    <td>${player.wrc_plus !== undefined ? player.wrc_plus : '—'}</td>
                    <td>${player.xslg !== undefined ? player.xslg.toFixed(3) : '—'}</td>
                    <td class="actions">
                        <button class="btn-small btn-view" onclick="showPlayerDetail(${player.player_id})">View</button>
                    </td>
                `;
            });
        }

        function updateStats() {
            document.getElementById('totalPlayers').textContent = filteredPlayers.length;
            
            if (filteredPlayers.length > 0) {
                const avgPlus = (filteredPlayers.reduce((sum, p) => sum + p.xwoba_plus, 0) / filteredPlayers.length).toFixed(0);
                document.getElementById('avgXwobaPlus').textContent = avgPlus;
                
                const topXwoba = Math.max(...filteredPlayers.map(p => p.xwoba)).toFixed(3);
                document.getElementById('topXwoba').textContent = topXwoba;
            } else {
                document.getElementById('avgXwobaPlus').textContent = '0';
                document.getElementById('topXwoba').textContent = '0';
            }
        }

        function showPlayerDetail(playerId) {
            const player = activePlayers.find(p => p.player_id === playerId);
            if (!player) return;

            const xwobaPercentile = ((activePlayers.filter(p => p.xwoba < player.xwoba).length / activePlayers.length) * 100).toFixed(0);
            const wobaPercentile = ((activePlayers.filter(p => p.woba < player.woba).length / activePlayers.length) * 100).toFixed(0);
            const plusPercentile = ((activePlayers.filter(p => p.xwoba_plus < player.xwoba_plus).length / activePlayers.length) * 100).toFixed(0);
            
            const luckFactor = player.woba - player.xwoba;
            const luckText = luckFactor > 0.010 ? 'Lucky' : luckFactor < -0.010 ? 'Unlucky' : 'As Expected';
            const luckColor = luckFactor > 0.010 ? '#43e97b' : luckFactor < -0.010 ? '#f5576c' : '#666';

            const initials = getInitials(player.full_name);
            const gradient = getGradient(player.player_id);

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="player-details">
                    <div class="headshot-container" style="background: ${gradient};">
                        <div class="player-initials">${initials}</div>
                    </div>
                    <div class="player-info">
                        <h3>${player.full_name}</h3>
                        <div class="player-meta">
                            <div class="meta-item">
                                <span class="meta-label">Position:</span> ${player.position}
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Team:</span> ${player.team_name}
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Height:</span> ${player.height}
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Weight:</span> ${player.weight} lbs
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Bats:</span> ${player.bats}
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Throws:</span> ${player.throws}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section-title">Expected Performance</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>xwOBA+ Rank</h4>
                        <div class="value">#${activePlayers.filter(p => p.xwoba_plus > player.xwoba_plus).length + 1}</div>
                        <div class="percentile">${plusPercentile}th percentile</div>
                    </div>
                    <div class="stat-card">
                        <h4>xwOBA+</h4>
                        <div class="value">${player.xwoba_plus}</div>
                        <div class="percentile">League Avg: 100</div>
                    </div>
                    <div class="stat-card">
                        <h4>Expected wOBA</h4>
                        <div class="value">${player.xwoba.toFixed(3)}</div>
                        <div class="percentile">${xwobaPercentile}th percentile</div>
                    </div>
                    ${player.xslg !== undefined ? `
                    <div class="stat-card">
                        <h4>xSLG</h4>
                        <div class="value">${player.xslg.toFixed(3)}</div>
                        <div class="percentile">Lg Avg: ${LEAGUE_AVG_XSLG.toFixed(3)}</div>
                    </div>` : ''}
                    ${player.wrc_plus !== undefined ? `
                    <div class="stat-card">
                        <h4>wRC+</h4>
                        <div class="value">${player.wrc_plus}</div>
                        <div class="percentile">League Avg: 100</div>
                    </div>` : ''}
                </div>

                <div class="section-title">Actual Performance</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>Actual wOBA</h4>
                        <div class="value">${player.woba.toFixed(3)}</div>
                        <div class="percentile">${wobaPercentile}th percentile</div>
                    </div>
                    <div class="stat-card">
                        <h4>Plate Appearances</h4>
                        <div class="value">${player.pa}</div>
                    </div>
                    <div class="stat-card">
                        <h4>Luck Factor</h4>
                        <div class="value" style="color: ${luckColor}">${luckFactor > 0 ? '+' : ''}${luckFactor.toFixed(3)}</div>
                        <div class="percentile">${luckText}</div>
                    </div>
                </div>
            `;

            document.getElementById('playerModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
        }

        function togglePlayerSelection(playerId) {
            if (selectedPlayers.has(playerId)) {
                selectedPlayers.delete(playerId);
            } else {
                if (selectedPlayers.size >= 5) {
                    alert('Maximum 5 players can be selected for comparison');
                    // Uncheck the checkbox
                    const checkbox = document.querySelector(`input[data-player-id="${playerId}"]`);
                    if (checkbox) checkbox.checked = false;
                    return;
                }
                selectedPlayers.add(playerId);
            }
            updateCompareButton();
            updateSelectAllCheckbox();
        }

        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.player-checkbox');
            
            if (selectAllCheckbox.checked) {
                // Select visible players up to limit
                checkboxes.forEach(cb => {
                    const playerId = parseInt(cb.dataset.playerId);
                    if (selectedPlayers.size < 5) {
                        selectedPlayers.add(playerId);
                        cb.checked = true;
                    }
                });
            } else {
                // Deselect all
                selectedPlayers.clear();
                checkboxes.forEach(cb => cb.checked = false);
            }
            
            updateCompareButton();
        }

        function updateSelectAllCheckbox() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.player-checkbox');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            const someChecked = Array.from(checkboxes).some(cb => cb.checked);
            
            selectAllCheckbox.checked = allChecked;
            selectAllCheckbox.indeterminate = someChecked && !allChecked;
        }

        function updateCompareButton() {
            const btn = document.getElementById('compareBtn');
            const count = selectedPlayers.size;
            
            btn.textContent = `Compare Selected (${count})`;
            btn.disabled = count === 0;
        }

        function compareSelected() {
            if (selectedPlayers.size === 0) return;
            
            comparisonPlayers = Array.from(selectedPlayers);
            showLeagueAvg = false;
            document.getElementById('comparisonModal').style.display = 'block';
            updateComparison();
        }

        function toggleLeagueAvg() {
            showLeagueAvg = !showLeagueAvg;
            document.getElementById('leagueAvgBtn').textContent = 
                showLeagueAvg ? 'Remove League Average' : 'Add League Average';
            updateComparison();
        }

        function removeFromComparison(playerId) {
            comparisonPlayers = comparisonPlayers.filter(id => id !== playerId);
            selectedPlayers.delete(playerId);
            
            // Uncheck the checkbox if visible
            const checkbox = document.querySelector(`input[data-player-id="${playerId}"]`);
            if (checkbox) checkbox.checked = false;
            
            updateCompareButton();
            updateSelectAllCheckbox();
            updateComparison();
        }

        function clearComparison() {
            comparisonPlayers = [];
            selectedPlayers.clear();
            showLeagueAvg = false;
            
            // Uncheck all checkboxes
            document.querySelectorAll('.player-checkbox').forEach(cb => cb.checked = false);
            document.getElementById('selectAll').checked = false;
            
            document.getElementById('leagueAvgBtn').textContent = 'Add League Average';
            updateCompareButton();
            updateComparison();
        }

        function updateComparison() {
            const selectedDiv = document.getElementById('selectedPlayers');
            const chartDiv = document.getElementById('comparisonChart');
            
            let html = '';
            comparisonPlayers.forEach(playerId => {
                const player = activePlayers.find(p => p.player_id === playerId);
                if (player) {
                    html += `
                        <div class="player-chip">
                            ${player.full_name}
                            <span class="remove-chip" onclick="removeFromComparison(${playerId})">×</span>
                        </div>
                    `;
                }
            });
            
            if (showLeagueAvg) {
                html += `
                    <div class="player-chip league-avg">
                        League Average
                        <span class="remove-chip" onclick="toggleLeagueAvg()">×</span>
                    </div>
                `;
            }
            
            selectedDiv.innerHTML = html;

            if (comparisonPlayers.length === 0 && !showLeagueAvg) {
                chartDiv.innerHTML = '<div class="no-data">Select players from the table to compare</div>';
                return;
            }

            // If only showing league average, show it as reference
            if (comparisonPlayers.length === 0 && showLeagueAvg) {
                chartDiv.innerHTML = `
                    <div class="no-data">
                        <p style="margin-bottom: 20px;">League Average Reference</p>
                        <table class="comparison-table" style="max-width: 400px; margin: 0 auto;">
                            <thead>
                                <tr>
                                    <th style="text-align: left;">Metric</th>
                                    <th>MLB Average</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="padding: 12px;"><strong>xwOBA+</strong></td>
                                    <td style="text-align: center; padding: 12px;"><strong>100</strong></td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px;"><strong>Expected wOBA</strong></td>
                                    <td style="text-align: center; padding: 12px;"><strong>${LEAGUE_AVG_XWOBA.toFixed(3)}</strong></td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px;"><strong>Actual wOBA</strong></td>
                                    <td style="text-align: center; padding: 12px;"><strong>${LEAGUE_AVG_WOBA.toFixed(3)}</strong></td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px;"><strong>xSLG</strong></td>
                                    <td style="text-align: center; padding: 12px;"><strong>${LEAGUE_AVG_XSLG.toFixed(3)}</strong></td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px;"><strong>wRC+</strong></td>
                                    <td style="text-align: center; padding: 12px;"><strong>100</strong></td>
                                </tr>
                            </tbody>
                        </table>
                        <p style="margin-top: 20px; font-size: 0.9em; color: #666;">Select players to compare against league average</p>
                    </div>
                `;
                return;
            }

            const players = comparisonPlayers.map(id => activePlayers.find(p => p.player_id === id));
            
            // Create comparison table
            let tableHtml = `
                <table class="comparison-table">
                    <thead>
                        <tr>
                            <th>Metric</th>
            `;
            
            players.forEach(player => {
                const initials = getInitials(player.full_name);
                const gradient = getGradient(player.player_id);
                tableHtml += `
                    <th>
                        <div class="player-header">
                            <div class="mini-headshot" style="background: ${gradient};">${initials}</div>
                            <div class="player-name-small">${player.full_name}</div>
                            <div class="player-team-small">${player.team_abbr} • ${player.position}</div>
                        </div>
                    </th>
                `;
            });
            
            if (showLeagueAvg) {
                tableHtml += `
                    <th>
                        <div class="player-header league-avg-header">
                            <div class="mini-headshot" style="background: #6c757d;">LG</div>
                            <div class="player-name-small">League Avg</div>
                            <div class="player-team-small">MLB</div>
                        </div>
                    </th>
                `;
            }
            
            tableHtml += `
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            // Metrics to compare
            const metrics = [
                { key: 'xwoba_plus', label: 'xwOBA+', format: v => v, baseline: 100, higher: true },
                { key: 'wrc_plus', label: 'wRC+', format: v => v !== undefined ? v : '—', baseline: 100, higher: true },
                { key: 'xwoba', label: 'Expected wOBA', format: v => v.toFixed(3), baseline: LEAGUE_AVG_XWOBA, higher: true },
                { key: 'woba', label: 'Actual wOBA', format: v => v.toFixed(3), baseline: LEAGUE_AVG_WOBA, higher: true },
                { key: 'xslg', label: 'xSLG', format: v => v !== undefined ? v.toFixed(3) : '—', baseline: LEAGUE_AVG_XSLG, higher: true },
                { key: 'pa', label: 'Plate Appearances', format: v => v, baseline: null, higher: true }
            ];
            
            metrics.forEach(metric => {
                const values = players.map(p => p[metric.key]);
                if (showLeagueAvg && metric.baseline !== null) {
                    values.push(metric.baseline);
                }
                const maxValue = Math.max(...values);
                const minValue = Math.min(...values);
                
                tableHtml += `<tr><td class="metric-label"><strong>${metric.label}</strong></td>`;
                
                players.forEach(player => {
                    const value = player[metric.key];
                    const displayValue = metric.format(value);
                    const isBest = value === maxValue && metric.higher;
                    const isWorst = value === minValue && !metric.higher && players.length > 1;
                    const cellClass = isBest ? 'best-value' : (isWorst ? 'worst-value' : '');
                    
                    // Calculate bar width for visual comparison
                    const range = maxValue - minValue || 1;
                    const percentage = ((value - minValue) / range) * 100;
                    
                    tableHtml += `
                        <td class="metric-value ${cellClass}">
                            <div class="value-container">
                                <div class="value-bar" style="width: ${percentage}%; background: ${getGradient(player.player_id)}"></div>
                                <span class="value-text">${displayValue}</span>
                            </div>
                        </td>
                    `;
                });
                
                if (showLeagueAvg && metric.baseline !== null) {
                    const value = metric.baseline;
                    const displayValue = metric.format(value);
                    const percentage = metric.baseline !== null ? ((value - minValue) / (maxValue - minValue || 1)) * 100 : 0;
                    
                    tableHtml += `
                        <td class="metric-value league-avg-cell">
                            <div class="value-container">
                                <div class="value-bar" style="width: ${percentage}%; background: #6c757d"></div>
                                <span class="value-text">${displayValue}</span>
                            </div>
                        </td>
                    `;
                } else if (showLeagueAvg) {
                    tableHtml += `<td class="metric-value league-avg-cell">—</td>`;
                }
                
                tableHtml += `</tr>`;
            });
            
            // Add luck factor
            tableHtml += `<tr><td class="metric-label"><strong>Luck Factor</strong></td>`;
            players.forEach(player => {
                const luck = player.woba - player.xwoba;
                const luckText = luck > 0 ? '+' + luck.toFixed(3) : luck.toFixed(3);
                const luckClass = luck > 0.010 ? 'lucky' : (luck < -0.010 ? 'unlucky' : '');
                tableHtml += `<td class="metric-value ${luckClass}"><span class="value-text">${luckText}</span></td>`;
            });
            if (showLeagueAvg) {
                tableHtml += `<td class="metric-value league-avg-cell">—</td>`;
            }
            tableHtml += `</tr>`;
            
            tableHtml += `
                    </tbody>
                </table>
            `;

            chartDiv.innerHTML = tableHtml;
        }

        function closeComparisonModal() {
            document.getElementById('comparisonModal').style.display = 'none';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('paFilter').addEventListener('change', applyFilters);
        document.getElementById('teamFilter').addEventListener('change', applyFilters);
        document.getElementById('positionFilter').addEventListener('change', applyFilters);

        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.column;
                
                if (currentSort.column === column) {
                    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort.column = column;
                    currentSort.direction = 'desc';
                }
                
                document.querySelectorAll('th').forEach(h => {
                    h.classList.remove('sort-asc', 'sort-desc');
                });
                
                th.classList.add(currentSort.direction === 'asc' ? 'sort-asc' : 'sort-desc');
                
                sortData();
                renderTable();
            });
        });

        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };

        // Initialize
        populateFilters();
        applyFilters();
    </script>
</body>
</html>
